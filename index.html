<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="家計簿">
<title>家計簿PWA</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: #0f1117; color: #f1f5f9; font-family: 'Hiragino Sans', sans-serif; }
  body {
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    min-height: 100vh;
  }

  .header {
    background: #1a1d27;
    border-bottom: 1px solid #2e3347;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 700;
    background: linear-gradient(90deg, #6ee7b7, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header button {
    background: none;
    border: none;
    font-size: 22px;
    color: #94a3b8;
    cursor: pointer;
    padding: 4px 8px;
  }

  .nav {
    display: flex;
    background: #1a1d27;
    border-bottom: 1px solid #2e3347;
  }
  .nav button {
    flex: 1;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: #94a3b8;
    padding: 12px 0;
    font-size: 13px;
    cursor: pointer;
  }
  .nav button.active {
    color: #6ee7b7;
    border-bottom-color: #6ee7b7;
  }

  main { padding: 16px; }
  .page { display: none; }
  .page.active { display: block; }

  .card {
    background: #1a1d27;
    border: 1px solid #2e3347;
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 14px;
  }
  .card-title {
    font-size: 12px;
    color: #94a3b8;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .capture {
    background: #222536;
    border: 2px dashed #2e3347;
    border-radius: 12px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    color: #94a3b8;
  }
  .capture .icon { font-size: 48px; margin-bottom: 8px; }
  .capture.has-image { padding: 8px; }
  .capture img { width: 100%; border-radius: 8px; display: block; }

  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 10px;
  }
  .btn-primary {
    background: linear-gradient(135deg, #6ee7b7, #818cf8);
    color: #0f1117;
  }
  .btn-outline {
    background: transparent;
    border: 1px solid #2e3347;
    color: #f1f5f9;
  }
  .btn:disabled { opacity: 0.5; }

  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    font-size: 12px;
    color: #94a3b8;
    margin-bottom: 6px;
  }
  .form-group input, .form-group select {
    width: 100%;
    background: #222536;
    border: 1px solid #2e3347;
    border-radius: 10px;
    padding: 12px;
    color: #f1f5f9;
    font-size: 14px;
    font-family: inherit;
  }

  .item {
    background: #222536;
    border: 1px solid #2e3347;
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 8px;
    cursor: pointer;
  }
  .item-top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .item-name { font-weight: 600; font-size: 14px; flex: 1; }
  .item-amount { color: #6ee7b7; font-weight: 700; }
  .item-cats { font-size: 11px; color: #94a3b8; }

  .total {
    background: rgba(110,231,183,0.1);
    border: 1px solid #6ee7b7;
    border-radius: 10px;
    padding: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 10px 0;
  }
  .total-label { color: #94a3b8; font-size: 13px; }
  .total-amount { font-size: 22px; font-weight: 800; color: #6ee7b7; }

  .history-item {
    padding: 12px 0;
    border-bottom: 1px solid #2e3347;
    display: flex;
    justify-content: space-between;
  }
  .history-name { font-size: 14px; }
  .history-cat { font-size: 11px; color: #94a3b8; margin-top: 2px; }
  .history-right { text-align: right; }
  .history-amount { color: #6ee7b7; font-weight: 700; font-size: 14px; }
  .history-date { font-size: 10px; color: #94a3b8; }

  .summary-month { font-size: 14px; color: #94a3b8; }
  .summary-total {
    font-size: 32px;
    font-weight: 900;
    background: linear-gradient(90deg, #6ee7b7, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 4px 0 16px;
  }
  .bar-item { margin-bottom: 12px; }
  .bar-header {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 4px;
  }
  .bar-track {
    height: 6px;
    background: #222536;
    border-radius: 3px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #6ee7b7, #818cf8);
  }

  .empty { text-align: center; color: #94a3b8; padding: 30px; font-size: 13px; }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid #2e3347;
    border-top-color: #6ee7b7;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 30px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal.show { display: flex; }
  .modal-content {
    background: #1a1d27;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    border-radius: 16px 16px 0 0;
    padding: 20px 18px 30px;
  }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #222536;
    border: 1px solid #2e3347;
    border-radius: 12px;
    padding: 12px 18px;
    font-size: 13px;
    max-width: 86vw;
    text-align: center;
    line-height: 1.5;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    z-index: 300;
    white-space: pre-line;
  }
  .toast.show { opacity: 1; }
  .toast.error { border-color: #f87171; color: #f87171; }
  .toast.success { border-color: #6ee7b7; color: #6ee7b7; }

  #file-input { display: none; }
</style>
</head>
<body>

<header class="header">
  <h1>💰 家計簿</h1>
  <button onclick="showPage('settings')">⚙️</button>
</header>

<nav class="nav">
  <button class="active" id="tab-capture" onclick="showPage('capture')">📷 撮影</button>
  <button id="tab-history" onclick="showPage('history')">📋 履歴</button>
  <button id="tab-summary" onclick="showPage('summary')">📊 集計</button>
</nav>

<main>

  <div class="page active" id="page-capture">
    <div class="card">
      <div class="card-title">📷 レシートを撮影</div>
      <div class="capture" id="capture-zone" onclick="document.getElementById('file-input').click()">
        <div class="icon">📷</div>
        <div>タップしてレシートを撮影</div>
        <div style="font-size:12px;margin-top:6px">または画像を選択</div>
      </div>
      <input type="file" id="file-input" accept="image/*" onchange="handleImageSelect(event)">
      <button class="btn btn-outline" onclick="openGallery()">📁 ギャラリーから選ぶ</button>
    </div>

    <div id="analyzing" style="display:none">
      <div class="spinner"></div>
      <div style="text-align:center;color:#94a3b8;font-size:13px">AIがレシートを解析中...</div>
    </div>

    <div id="result-area" style="display:none">
      <div class="card">
        <div class="card-title">✅ 解析結果（タップして編集）</div>
        <div id="result-items"></div>
        <div class="total">
          <div class="total-label">レシート合計</div>
          <div class="total-amount" id="result-total">¥0</div>
        </div>
        <button class="btn btn-primary" onclick="sendToSheets()">📊 スプレッドシートに送信</button>
        <button class="btn btn-outline" onclick="resetCapture()">🔄 撮り直す</button>
      </div>
    </div>
  </div>

  <div class="page" id="page-history">
    <div class="card">
      <div class="card-title">📋 直近の明細</div>
      <div id="history-list"><div class="empty">読み込み中...</div></div>
    </div>
  </div>

  <div class="page" id="page-summary">
    <div class="card">
      <div class="summary-month" id="summary-month"></div>
      <div class="summary-total" id="summary-total">¥0</div>
      <div id="summary-bars"></div>
    </div>
  </div>

  <div class="page" id="page-settings">
    <div class="card">
      <div class="card-title">🔑 API設定</div>
      <div class="form-group">
        <label>Gemini API キー</label>
        <input type="password" id="gemini-key" placeholder="AIzaSy...">
      </div>
      <div class="form-group">
        <label>Google Apps Script URL</label>
        <input type="text" id="gas-url" placeholder="https://script.google.com/...">
      </div>
      <button class="btn btn-primary" onclick="saveSettings()">💾 保存</button>
    </div>
  </div>

</main>

<div class="modal" id="edit-modal">
  <div class="modal-content">
    <h3 style="margin-bottom:16px;font-size:15px">✏️ 明細を編集</h3>
    <input type="hidden" id="edit-index">
    <div class="form-group"><label>日付</label><input type="date" id="edit-date"></div>
    <div class="form-group"><label>品目・店名</label><input type="text" id="edit-name"></div>
    <div class="form-group"><label>費目カテゴリ（大）</label><select id="edit-large" onchange="updateMiddle()"></select></div>
    <div class="form-group"><label>費目詳細（中）</label><select id="edit-middle"></select></div>
    <div class="form-group"><label>金額</label><input type="number" id="edit-amount"></div>
    <button class="btn btn-primary" onclick="saveEdit()">保存</button>
    <button class="btn btn-outline" onclick="closeModal()">キャンセル</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SETTINGS_KEY = 'kakeibo_settings';
let settings = { geminiKey: '', gasUrl: '' };
let categories = [];
let parsedItems = [];
let currentImageBase64 = '';

window.addEventListener('DOMContentLoaded', () => {
  loadSettings();
  loadCategories();
});

function loadSettings() {
  try {
    const saved = localStorage.getItem(SETTINGS_KEY);
    if (saved) settings = { ...settings, ...JSON.parse(saved) };
  } catch(e) {}
  document.getElementById('gemini-key').value = settings.geminiKey || '';
  document.getElementById('gas-url').value    = settings.gasUrl || '';
}

function saveSettings() {
  settings.geminiKey = document.getElementById('gemini-key').value.trim();
  settings.gasUrl    = document.getElementById('gas-url').value.trim();
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
  showToast('設定を保存しました', 'success');
  loadCategories();
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  const tab = document.getElementById('tab-' + name);
  if (tab) tab.classList.add('active');
  if (name === 'history') loadHistory();
  if (name === 'summary') loadSummary();
}

function openGallery() {
  const input = document.getElementById('file-input');
  input.removeAttribute('capture');
  input.click();
}

function handleImageSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    currentImageBase64 = e.target.result.split(',')[1];
    const zone = document.getElementById('capture-zone');
    zone.innerHTML = '<img src="' + e.target.result + '" alt="プレビュー">';
    zone.classList.add('has-image');
    analyzeReceipt();
  };
  reader.readAsDataURL(file);
}

async function analyzeReceipt() {
  if (!settings.geminiKey) {
    showToast('⚙️設定でAPIキーを入力してください', 'error');
    setTimeout(() => showPage('settings'), 800);
    return;
  }
  document.getElementById('analyzing').style.display = 'block';
  document.getElementById('result-area').style.display = 'none';

  const prompt = `これからレシート画像を送ります。
画像内の購入明細を読み取り、家計簿カテゴリに分類してください。

【出力形式】必ずJSON配列のみを出力。他のテキストは一切不要。
[{"date":"YYYY-MM-DD","store":"店名","name":"品目","amount":数値,"large":"費目カテゴリ","middle":"費目詳細"}]

【ルール】
- 1行=1明細。同一カテゴリは合算可
- 金額は税込最終支払額
- 日付はレシート記載のもの
- 合計・税・ポイント・支払方法は除外
- 割引は最終支払額に一致するよう案分

【カテゴリ】
居住費: 住宅ローン
貯蓄・投資: 投資, 生活防衛費, 教育資金, 特別費
固定費: 生命・医療保険料, 自動車保険料, 火災・地震保険料, 通信費(携帯), 通信費(ネット), サブスクリプション費用, ガソリン代, 車検・維持費
変動費: 食費(内食費), 中食費, 外食費, 電気代, ガス代, 水道代, 日用品・消耗品, 美容・理容費, 被服費, 医療費, 交通費, ペット, 嗜好品
教育・養育費: 保育料, 習い事・教材費, 学資保険料, 育児用品・雑費
予備費・小遣い: 家族共通, 亮太朗, 眞衣子, 冠婚葬祭・プレゼント・お祝い
税金等: 固定資産税・都市計画税, ふるさと納税, 自動車税, 自治会費

【優先分類】
- 肉・野菜・調味料・パン・菓子等の食材→変動費/食費(内食費)
- 酒類→変動費/嗜好品
- 惣菜・弁当・調理済→変動費/中食費
- 宅配ピザ・ファストフード・テイクアウト→変動費/中食費
- 店内飲食→変動費/外食費
- 医薬品→変動費/医療費
- オムツ・洗剤・ティッシュ等→変動費/日用品・消耗品`;

  try {
    const res = await fetch(
      'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + settings.geminiKey,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [
              { text: prompt },
              { inline_data: { mime_type: 'image/jpeg', data: currentImageBase64 } }
            ]
          }]
        })
      }
    );
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    if (!text) throw new Error('Geminiの応答が空');

    let jsonText = text.match(/```json\s*([\s\S]*?)```/)?.[1];
    if (!jsonText) jsonText = text.match(/```\s*([\s\S]*?)```/)?.[1];
    if (!jsonText) jsonText = text.match(/\[[\s\S]*\]/)?.[0];
    if (!jsonText) throw new Error('JSON抽出失敗: ' + text.substring(0,100));

    parsedItems = JSON.parse(jsonText.trim());
    if (!Array.isArray(parsedItems)) parsedItems = [parsedItems];
    renderResults();
  } catch(err) {
    showToast('解析失敗\n' + err.message, 'error');
  } finally {
    document.getElementById('analyzing').style.display = 'none';
  }
}

function renderResults() {
  const container = document.getElementById('result-items');
  let total = 0;
  container.innerHTML = parsedItems.map((item, i) => {
    total += Number(item.amount) || 0;
    return `<div class="item" onclick="openEdit(${i})">
      <div class="item-top">
        <div class="item-name">${item.name || item.store || '不明'}</div>
        <div class="item-amount">¥${Number(item.amount).toLocaleString()}</div>
      </div>
      <div class="item-cats">${item.large || '?'} › ${item.middle || '?'} ${item.date ? '・' + item.date : ''}</div>
    </div>`;
  }).join('');
  document.getElementById('result-total').textContent = '¥' + total.toLocaleString();
  document.getElementById('result-area').style.display = 'block';
}

function openEdit(i) {
  const item = parsedItems[i];
  document.getElementById('edit-index').value = i;
  document.getElementById('edit-date').value = item.date || '';
  document.getElementById('edit-name').value = item.name || item.store || '';
  document.getElementById('edit-amount').value = item.amount || '';

  const larges = [...new Set(categories.map(c => c.large))];
  document.getElementById('edit-large').innerHTML = larges.map(l =>
    `<option ${l === item.large ? 'selected' : ''}>${l}</option>`
  ).join('');
  updateMiddle(item.middle);
  document.getElementById('edit-modal').classList.add('show');
}

function updateMiddle(selected) {
  const large = document.getElementById('edit-large').value;
  const middles = categories.filter(c => c.large === large).map(c => c.middle);
  document.getElementById('edit-middle').innerHTML = middles.map(m =>
    `<option ${m === selected ? 'selected' : ''}>${m}</option>`
  ).join('');
}

function saveEdit() {
  const i = parseInt(document.getElementById('edit-index').value);
  parsedItems[i].date   = document.getElementById('edit-date').value;
  parsedItems[i].name   = document.getElementById('edit-name').value;
  parsedItems[i].large  = document.getElementById('edit-large').value;
  parsedItems[i].middle = document.getElementById('edit-middle').value;
  parsedItems[i].amount = parseInt(document.getElementById('edit-amount').value) || 0;
  closeModal();
  renderResults();
}

function closeModal() {
  document.getElementById('edit-modal').classList.remove('show');
}

async function sendToSheets() {
  if (!settings.gasUrl) { showToast('Apps Script URLを設定してください', 'error'); return; }
  if (parsedItems.length === 0) return;
  const btn = document.querySelector('#result-area .btn-primary');
  btn.disabled = true;
  btn.textContent = '送信中...';
  const items = parsedItems.map(item => ({
    date: item.date || '',
    category: item.large || '',
    detail: item.middle || '',
    amount: item.amount || 0,
    store: item.store || ''
  }));
  try {
    await fetch(settings.gasUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'addItems', items })
    });
    showToast(items.length + '件を送信しました！', 'success');
    setTimeout(() => resetCapture(), 1500);
  } catch(err) {
    showToast('送信失敗: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '📊 スプレッドシートに送信';
  }
}

async function loadCategories() {
  if (!settings.gasUrl) return;
  try {
    const res = await fetch(settings.gasUrl + '?action=getCategories');
    const data = await res.json();
    if (data.success) categories = data.categories;
  } catch(e) {
    categories = [
      {large:'変動費',middle:'食費(内食費)'},
      {large:'変動費',middle:'中食費'},
      {large:'変動費',middle:'外食費'},
      {large:'変動費',middle:'日用品・消耗品'},
      {large:'変動費',middle:'嗜好品'},
    ];
  }
}

async function loadHistory() {
  const list = document.getElementById('history-list');
  if (!settings.gasUrl) { list.innerHTML = '<div class="empty">設定が必要です</div>'; return; }
  list.innerHTML = '<div class="empty">読み込み中...</div>';
  try {
    const res = await fetch(settings.gasUrl + '?action=getRecentItems&limit=50');
    const data = await res.json();
    if (!data.success || data.items.length === 0) {
      list.innerHTML = '<div class="empty">まだ記録がありません</div>';
      return;
    }
    list.innerHTML = data.items.map(item => `
      <div class="history-item">
        <div>
          <div class="history-name">${item.detail || item.category}</div>
          <div class="history-cat">${item.category} › ${item.detail}</div>
        </div>
        <div class="history-right">
          <div class="history-amount">¥${Number(item.amount).toLocaleString()}</div>
          <div class="history-date">${item.date}</div>
        </div>
      </div>
    `).join('');
  } catch(e) {
    list.innerHTML = '<div class="empty">読み込み失敗</div>';
  }
}

async function loadSummary() {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth() + 1;
  document.getElementById('summary-month').textContent = y + '年' + m + '月の支出';
  const bars = document.getElementById('summary-bars');
  if (!settings.gasUrl) { bars.innerHTML = '<div class="empty">設定が必要です</div>'; return; }
  try {
    const res = await fetch(settings.gasUrl + '?action=getMonthlySummary&year=' + y + '&month=' + m);
    const data = await res.json();
    if (!data.success || data.summary.length === 0) {
      document.getElementById('summary-total').textContent = '¥0';
      bars.innerHTML = '<div class="empty">今月のデータがありません</div>';
      return;
    }
    const byLarge = {};
    let total = 0;
    data.summary.forEach(row => {
      byLarge[row.large] = (byLarge[row.large] || 0) + row.amount;
      total += row.amount;
    });
    document.getElementById('summary-total').textContent = '¥' + total.toLocaleString();
    bars.innerHTML = Object.entries(byLarge).sort((a,b) => b[1]-a[1]).map(([cat, amt]) => `
      <div class="bar-item">
        <div class="bar-header"><span>${cat}</span><span>¥${amt.toLocaleString()}</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(amt/total*100)}%"></div></div>
      </div>
    `).join('');
  } catch(e) {
    bars.innerHTML = '<div class="empty">読み込み失敗</div>';
  }
}

function resetCapture() {
  parsedItems = [];
  currentImageBase64 = '';
  document.getElementById('result-area').style.display = 'none';
  document.getElementById('analyzing').style.display = 'none';
  document.getElementById('file-input').value = '';
  const zone = document.getElementById('capture-zone');
  zone.classList.remove('has-image');
  zone.innerHTML = '<div class="icon">📷</div><div>タップしてレシートを撮影</div><div style="font-size:12px;margin-top:6px">または画像を選択</div>';
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || '') + ' show';
  setTimeout(() => t.classList.remove('show'), 3500);
}
</script>
</body>
